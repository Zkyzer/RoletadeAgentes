<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roleta de Agentes</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #1f2a36 0%, #0f1923 55%, #091017 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 950px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .topo {
      padding: 28px 28px 10px;
      text-align: center;
    }

    .topo h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 0.5px;
    }

    .topo p {
      margin-top: 10px;
      color: #b8c2cc;
      font-size: 15px;
    }

    .conteudo {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
    }

    .painel {
      padding: 24px;
      background: rgba(255, 255, 255, 0.03);
      border-right: 1px solid rgba(255, 255, 255, 0.06);
    }

    .painel h2 {
      margin-top: 0;
      font-size: 20px;
      margin-bottom: 18px;
    }

    .campo {
      margin-bottom: 18px;
    }

    .campo label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #d7dee5;
      font-weight: bold;
    }

    .campo select {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      outline: none;
    }

    .botoes {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .botao-principal {
      background: #ff4655;
      color: white;
    }

    .botao-secundario {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    .resultado-area {
      padding: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      padding: 22px;
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .imagem-wrapper {
      position: relative;
      width: 100%;
      height: 360px;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      margin-bottom: 18px;
    }

    .imagem-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    .imagem-wrapper.sorteando img {
      opacity: 0.45;
      transform: scale(1.04);
    }

    .status {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #8fa0b1;
      margin-bottom: 10px;
    }

    .nome-agente {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 10px;
      min-height: 38px;
    }

    .classe-agente {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .descricao {
      color: #c8d1d9;
      font-size: 15px;
      line-height: 1.5;
      min-height: 46px;
    }

    .duelista {
      background: rgba(255, 70, 85, 0.20);
      color: #ff8c96;
    }

    .controlador {
      background: rgba(127, 90, 240, 0.20);
      color: #c5b3ff;
    }

    .iniciador {
      background: rgba(0, 184, 148, 0.20);
      color: #86f2d2;
    }

    .sentinela {
      background: rgba(241, 196, 15, 0.20);
      color: #ffe27d;
    }

    .brilho {
      animation: piscar 0.7s infinite alternate;
    }

    @keyframes piscar {
      from {
        opacity: 0.65;
      }
      to {
        opacity: 1;
      }
    }

    @media (max-width: 860px) {
      .conteudo {
        grid-template-columns: 1fr;
      }

      .painel {
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .imagem-wrapper {
        height: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topo">
      <h1>Roleta de Agentes</h1>
      <p>Escolha uma classe, rode a roleta e descubra seu agente do VALORANT.</p>
    </div>

    <div class="conteudo">
      <div class="painel">
        <h2>Configurações</h2>

        <div class="campo">
          <label for="classe">Classe do sorteio</label>
          <select id="classe">
            <option value="todos">Todos</option>
            <option value="duelista">Duelista</option>
            <option value="controlador">Controlador</option>
            <option value="iniciador">Iniciador</option>
            <option value="sentinela">Sentinela</option>
          </select>
        </div>

        <div class="botoes">
          <button class="botao-principal" id="botaoSortear" onclick="iniciarSorteio()">
            Sortear agente
          </button>

          <button class="botao-secundario" onclick="limparResultado()">
            Limpar resultado
          </button>
        </div>
      </div>

      <div class="resultado-area">
        <div class="card">
          <div class="imagem-wrapper" id="imagemWrapper">
            <img id="imagemAgente" src="img/jett.png" alt="Agente">
          </div>

          <div class="status" id="statusSorteio">Pronto para sortear</div>
          <div class="nome-agente" id="nomeAgente">Jett</div>
          <div class="classe-agente duelista" id="classeAgente">Duelista</div>
          <div class="descricao" id="descricaoAgente">
            Clique no botão para iniciar a roleta.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const agentes = [
      { nome: "Astra", classe: "controlador", foto: "img/astra.png" },
      { nome: "Breach", classe: "iniciador", foto: "img/breach.png" },
      { nome: "Brimstone", classe: "controlador", foto: "img/brimstone.png" },
      { nome: "Chamber", classe: "sentinela", foto: "img/chamber.png" },
      { nome: "Clove", classe: "controlador", foto: "img/clove.png" },
      { nome: "Cypher", classe: "sentinela", foto: "img/cypher.png" },
      { nome: "Deadlock", classe: "sentinela", foto: "img/deadlock.png" },
      { nome: "Fade", classe: "iniciador", foto: "img/fade.png" },
      { nome: "Gekko", classe: "iniciador", foto: "img/gekko.png" },
      { nome: "Harbor", classe: "controlador", foto: "img/harbor.png" },
      { nome: "Iso", classe: "duelista", foto: "img/iso.png" },
      { nome: "Jett", classe: "duelista", foto: "img/jett.png" },
      { nome: "KAY/O", classe: "iniciador", foto: "img/kayo.png" },
      { nome: "Killjoy", classe: "sentinela", foto: "img/killjoy.png" },
      { nome: "Neon", classe: "duelista", foto: "img/neon.png" },
      { nome: "Omen", classe: "controlador", foto: "img/omen.png" },
      { nome: "Phoenix", classe: "duelista", foto: "img/phoenix.png" },
      { nome: "Raze", classe: "duelista", foto: "img/raze.png" },
      { nome: "Reyna", classe: "duelista", foto: "img/reyna.png" },
      { nome: "Sage", classe: "sentinela", foto: "img/sage.png" },
      { nome: "Skye", classe: "iniciador", foto: "img/skye.png" },
      { nome: "Sova", classe: "iniciador", foto: "img/sova.png" },
      { nome: "Tejo", classe: "iniciador", foto: "img/tejo.png" },
      { nome: "Viper", classe: "controlador", foto: "img/viper.png" },
      { nome: "Vyse", classe: "sentinela", foto: "img/vyse.png" },
      { nome: "Waylay", classe: "duelista", foto: "img/waylay.png" },
      { nome: "Yoru", classe: "duelista", foto: "img/yoru.png" }
    ];

    let sorteando = false;
    let intervaloAnimacao = null;

    function formatarClasse(classe) {
      if (classe === "duelista") return "Duelista";
      if (classe === "controlador") return "Controlador";
      if (classe === "iniciador") return "Iniciador";
      return "Sentinela";
    }

    function obterListaFiltrada() {
      const classeSelecionada = document.getElementById("classe").value;

      if (classeSelecionada === "todos") {
        return agentes;
      }

      return agentes.filter(function(agente) {
        return agente.classe === classeSelecionada;
      });
    }

    function sortearDaLista(lista) {
      const indice = Math.floor(Math.random() * lista.length);
      return lista[indice];
    }

    function mostrarAgente(agente, statusTexto) {
      const imagem = document.getElementById("imagemAgente");
      const nome = document.getElementById("nomeAgente");
      const classe = document.getElementById("classeAgente");
      const descricao = document.getElementById("descricaoAgente");
      const status = document.getElementById("statusSorteio");

      imagem.src = agente.foto;
      imagem.alt = agente.nome;

      nome.textContent = agente.nome;
      classe.textContent = formatarClasse(agente.classe);
      classe.className = "classe-agente " + agente.classe;

      status.textContent = statusTexto;
      descricao.textContent = "Classe sorteada: " + formatarClasse(agente.classe);
    }

    function iniciarSorteio() {
      if (sorteando === true) {
        return;
      }

      const lista = obterListaFiltrada();
      const botao = document.getElementById("botaoSortear");
      const wrapper = document.getElementById("imagemWrapper");
      const status = document.getElementById("statusSorteio");

      sorteando = true;
      botao.disabled = true;
      botao.textContent = "Sorteando...";
      wrapper.classList.add("sorteando");
      status.textContent = "Girando a roleta...";
      status.classList.add("brilho");

      intervaloAnimacao = setInterval(function() {
        const agenteTemporario = sortearDaLista(lista);
        mostrarAgente(agenteTemporario, "Sorteando...");
      }, 120);

      setTimeout(function() {
        clearInterval(intervaloAnimacao);

        const agenteFinal = sortearDaLista(lista);
        mostrarAgente(agenteFinal, "Agente definido");

        wrapper.classList.remove("sorteando");
        status.classList.remove("brilho");
        botao.disabled = false;
        botao.textContent = "Sortear novamente";
        sorteando = false;
      }, 2200);
    }

    function limparResultado() {
      if (sorteando === true) {
        return;
      }

      const imagem = document.getElementById("imagemAgente");
      const nome = document.getElementById("nomeAgente");
      const classe = document.getElementById("classeAgente");
      const descricao = document.getElementById("descricaoAgente");
      const status = document.getElementById("statusSorteio");
      const botao = document.getElementById("botaoSortear");
      const wrapper = document.getElementById("imagemWrapper");

      imagem.src = "img/jett.png";
      imagem.alt = "Agente";
      nome.textContent = "Jett";
      classe.textContent = "Duelista";
      classe.className = "classe-agente duelista";
      descricao.textContent = "Clique no botão para iniciar a roleta.";
      status.textContent = "Pronto para sortear";

      wrapper.classList.remove("sorteando");
      status.classList.remove("brilho");
      botao.textContent = "Sortear agente";
    }
  </script>
</body>
</html>
